<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Admin - Conteiner Beer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .dashboard { max-width: 800px; margin: auto; padding: 20px; text-align: left; background: var(--light-gray); min-height: 100vh;}
        .stat-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .stat-value { font-size: 32px; font-weight: bold; color: var(--primary-orange); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h2 style="color: var(--primary-blue); margin-bottom: 20px;">Painel de Controle 🍺</h2>
        
        <div class="stat-card">
            <h3>Jogadas Hoje</h3>
            <div class="stat-value" id="playsToday">Carregando...</div>
        </div>

        <div class="stat-card">
            <h3>Total de Jogadas (Geral)</h3>
            <div class="stat-value" id="totalPlays">Carregando...</div>
        </div>

        <div class="stat-card">
            <h3>Prêmios Distribuídos</h3>
            <table id="prizesTable">
                <tr><th>Prêmio</th><th>Quantidade</th></tr>
            </table>
        </div>
    </div>

    <script>
        const ADMIN_TOKEN = 'Bearer CONTEINER_BEER_ADMIN_2026';
        async function loadStats() {
            try {
                const response = await fetch('/api/admin/stats', { headers: { 'Authorization': ADMIN_TOKEN } });
                const data = await response.json();
                document.getElementById('playsToday').innerText = data.playsToday;
                document.getElementById('totalPlays').innerText = data.totalPlays;

                const table = document.getElementById('prizesTable');
                for (const [prize, count] of Object.entries(data.prizesGiven)) {
                    if(prize !== 'Tente Novamente') {
                        table.innerHTML += `<tr><td>${prize}</td><td>${count}</td></tr>`;
                    }
                }
            } catch (error) { alert('Erro ao carregar dados.'); }
        }
        loadStats();
    </script>
</body>
</html>
