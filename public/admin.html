<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Conteiner Beer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .dashboard { max-width: 800px; margin: auto; padding: 20px; text-align: left; background: var(--light-gray); min-height: 100vh; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .stat-value { font-size: 32px; font-weight: bold; color: var(--primary-orange); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
        .toolbar { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .toolbar input { flex: 1; min-width: 220px; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
        .toolbar button { padding: 10px 14px; border: none; border-radius: 8px; background: var(--primary-blue); color: white; cursor: pointer; }
        .helper-text { color: #666; margin-bottom: 12px; font-size: 13px; }
        .logout-btn { background: #c0392b; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h2 style="color: var(--primary-blue); margin-bottom: 10px;">Painel de Controle 🍺</h2>
        <p class="helper-text">Faça login com usuário e senha administrativos.</p>

        <div class="toolbar">
            <input id="usernameInput" type="text" placeholder="Usuário admin" autocomplete="username" />
            <input id="passwordInput" type="password" placeholder="Senha admin" autocomplete="current-password" />
            <button id="loginBtn">Entrar</button>
            <button id="logoutBtn" class="logout-btn">Sair</button>
        </div>

        <div class="stat-card">
            <h3>Jogadas Hoje</h3>
            <div class="stat-value" id="playsToday">-</div>
        </div>

        <div class="stat-card">
            <h3>Total de Jogadas (Geral)</h3>
            <div class="stat-value" id="totalPlays">-</div>
        </div>

        <div class="stat-card">
            <h3>Prêmios Distribuídos</h3>
            <table id="prizesTable">
                <tr><th>Prêmio</th><th>Quantidade</th></tr>
            </table>
        </div>
    </div>

    <script>
        const usernameInput = document.getElementById('usernameInput');
        const passwordInput = document.getElementById('passwordInput');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');

        async function loadStats() {
            try {
                const response = await fetch('/api/admin/stats', { credentials: 'same-origin' });

                if (!response.ok) {
                    throw new Error('Não autenticado.');
                }

                const data = await response.json();
                document.getElementById('playsToday').innerText = data.playsToday;
                document.getElementById('totalPlays').innerText = data.totalPlays;

                const table = document.getElementById('prizesTable');
                table.innerHTML = '<tr><th>Prêmio</th><th>Quantidade</th></tr>';

                Object.entries(data.prizesGiven).forEach(([prize, count]) => {
                    if (prize !== 'Tente Novamente') {
                        const tr = document.createElement('tr');
                        const prizeTd = document.createElement('td');
                        const countTd = document.createElement('td');
                        prizeTd.textContent = prize;
                        countTd.textContent = count;
                        tr.appendChild(prizeTd);
                        tr.appendChild(countTd);
                        table.appendChild(tr);
                    }
                });
            } catch (error) {
                document.getElementById('playsToday').innerText = '-';
                document.getElementById('totalPlays').innerText = '-';
            }
        }

        loginBtn.addEventListener('click', async () => {
            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            if (!username || !password) {
                alert('Informe usuário e senha.');
                return;
            }

            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({ username, password })
                });

                if (!response.ok) {
                    throw new Error('Credenciais inválidas.');
                }

                passwordInput.value = '';
                await loadStats();
                alert('Login realizado com sucesso.');
            } catch (error) {
                alert('Falha no login. Verifique usuário e senha.');
            }
        });

        logoutBtn.addEventListener('click', async () => {
            await fetch('/api/admin/logout', {
                method: 'POST',
                credentials: 'same-origin'
            });
            document.getElementById('playsToday').innerText = '-';
            document.getElementById('totalPlays').innerText = '-';
            const table = document.getElementById('prizesTable');
            table.innerHTML = '<tr><th>Prêmio</th><th>Quantidade</th></tr>';
            alert('Sessão encerrada.');
        });

        loadStats();
    </script>
</body>
</html>
